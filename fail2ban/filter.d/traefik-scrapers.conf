[Definition]

# Matches Traefik JSON access log lines where the request path is a known
# scraper / vulnerability scan signature. The client IP is captured from
# "ClientHost" (Traefik populates it with the real source IP).

failregex = ^\{.*"ClientHost":"<HOST>".*"RequestPath":"[^"]*(?:wp-login\.php|xmlrpc\.php|wlwmanifest\.xml|/\.env\b|/\.git/|phpmyadmin|/wp-admin|/wp-includes/|/wp-content/plugins|wp-config|eval-stdin\.php|/\.aws/|/\.ssh/|boaform|GponForm|HNAP1|phpunit)

ignoreregex =

datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%SZ"
