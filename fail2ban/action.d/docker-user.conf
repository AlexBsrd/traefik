# Fail2ban action that bans IPs by inserting DROP rules into a dedicated
# sub-chain (f2b-<name>) hooked at the top of Docker's DOCKER-USER chain.
#
# Why a dedicated chain: ufw-docker also writes into DOCKER-USER, and its
# `allow` command prepends ACCEPT rules. By keeping our bans in an isolated
# chain jumped to from DOCKER-USER, ufw-docker never touches our rules --
# it can only push the *jump* a few positions down, which is harmless as
# long as the jump stays above any ACCEPT that would match banned traffic.
#
# If you re-run `ufw-docker allow traefik ...`, restart fail2ban afterwards
# to re-insert the jump at position 1 of DOCKER-USER.

[Definition]

actionstart = { <iptables> -C f2b-<name> -j RETURN >/dev/null 2>&1; } || { <iptables> -N f2b-<name>; <iptables> -A f2b-<name> -j RETURN; }
              { <iptables> -C DOCKER-USER -j f2b-<name> >/dev/null 2>&1; } || <iptables> -I DOCKER-USER -j f2b-<name>

actionstop = <iptables> -D DOCKER-USER -j f2b-<name>
             <iptables> -F f2b-<name>
             <iptables> -X f2b-<name>

actioncheck = <iptables> -n -L DOCKER-USER | grep -q 'f2b-<name>[ \t]'

actionban = <iptables> -I f2b-<name> 1 -s <ip> -j <blocktype>

actionunban = <iptables> -D f2b-<name> -s <ip> -j <blocktype>

[Init]

name       = default
blocktype  = DROP
lockingopt = -w
iptables   = iptables <lockingopt>
